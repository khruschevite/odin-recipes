    <body>
        <h1>Toast sandwich</h1>
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/de/An_image_of_a_toast_sandwich%2C_shot_from_the_side.jpg" alt="literally a toasted bread between 2 slices of bread">
        <h2>Description</h2>
        <p>it's bread between two slices of bread.</p>
        <h2>Ingredients</h2>
        <ul>
            <li>3 sliecs of bread</li>
            <li>butter</li>
        </ul>
        <h2>Steps</h2>
        <ol>
            <li>Put one slice of bread in a toaster.</li>
            <li>Butter the toast.</li>
            <li>Put the toast between 2 slices of bread.</li>
        </ol>
